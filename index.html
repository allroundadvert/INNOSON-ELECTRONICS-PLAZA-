<section class="form-section">
  <h2>Place Your Order</h2>
  <form id="orderForm">
    <div class="form-group">
      <label for="name">Name:</label>
      <input type="text" id="name" required>
    </div>
    <div class="form-group">
      <label for="phone">Phone:</label>
      <input type="tel" id="phone" required>
    </div>
    <div class="form-group">
      <label>Select Products:</label>
      <div class="products">
        <label><input type="checkbox" value="Fridge"> Fridge</label>
        <label><input type="checkbox" value="Deep Freezer"> Deep Freezer</label>
        <label><input type="checkbox" value="Glass Cooker"> Glass Cooker</label>
        <label><input type="checkbox" value="AC Standing Unit"> AC Standing Unit</label>
        <label><input type="checkbox" value="AC Split Unit"> AC Split Unit</label>
        <label><input type="checkbox" value="Generator"> Generator</label>
        <label><input type="checkbox" value="Washing Machine"> Washing Machine</label>
        <label><input type="checkbox" value="Electric Oven"> Electric Oven</label>
        <label><input type="checkbox" value="Blender"> Blender</label>
        <label><input type="checkbox" value="Home Theater"> Home Theater</label>
        <label><input type="checkbox" value="Plasma TV"> Plasma TV</label>
        <label><input type="checkbox" value="Standing Fan"> Standing Fan</label>
        <label><input type="checkbox" value="Solar Fan"> Solar Fan</label>
        <label><input type="checkbox" value="Yam Pounder"> Yam Pounder</label>
      </div>
    </div>
    <div class="buttons">
      <a href="https://wa.me/2348038164370" target="_blank">WhatsApp</a>
      <a href="https://www.facebook.com/share/1AhBMfAvVh/" target="_blank" class="facebook">Facebook</a>
    </div>
    <button type="button" onclick="submitOrder()" style="margin-top:15px;background:#b8860b;color:white;">Submit Order</button>
  </form>
</section>

<script>
function submitOrder() {
  const name = document.getElementById('name').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const products = Array.from(document.querySelectorAll('.products input:checked')).map(i => i.value);
  if(!name || !phone || products.length === 0) {
    alert("Please fill all fields and select at least one product.");
    return;
  }
  let message = `Hello, my name is ${name}. I would like to order: ${products.join(', ')}. My phone number is ${phone}.`;
  window.open(`https://wa.me/2348038164370?text=${encodeURIComponent(message)}`, '_blank');
}
</script>
