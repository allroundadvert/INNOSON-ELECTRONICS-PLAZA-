  <h2>Place Your Order</h2>
  <form id="orderForm">
    <div class="form-group">
      <label for="name">Name:</label>

    </div>
    <div class="form-group">

        <label><input type="checkbox" value="AC Standing Unit"> AC Standing Unit</label>
        <label><input type="checkbox" value="AC Split Unit"> AC Split Unit</label>
        <label><input type="checkbox" value="Generator"> Generator</label>

        <label><input type="checkbox" value="Solar Fan"> Solar Fan</label>

    </div>
    <button type="button" onclick="submitOrder()" style="background:#d4af37;color:white;">Submit Order</button>

<script>
  function submitOrder() {
    const name = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const products = Array.from(document.querySelectorAll('.products input:checked')).map(i => i.value);

    if(!name || !phone || products.length === 0) {
      alert("Please fill all fields and select at least one product.");
      return;
    }

    let message = `Hello, my name is ${name}. I would like to order: ${products.join(', ')}. My phone number is ${phone}.`;
    window.open(`https://wa.me/2348038164370?text=${encodeURIComponent(message)}`, '_blank');
  }
</script>
